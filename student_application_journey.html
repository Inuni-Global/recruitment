<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCCU Application Process Guide</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 20px 0;
            text-align: center;
        }
        h1 {
            margin: 0;
        }
        .content {
            padding: 20px;
            background: #ffffff;
            margin: 20px 0;
            border-radius: 5px;
            box-shadow: 0 0 10px #ccc;
        }
        footer {
            text-align: center;
            padding: 10px 0;
            background: #35424a;
            color: #ffffff;
            position: relative;
            bottom: 0;
            width: 100%;
        }
        button {
            background-color: #35424a;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
    <script>
        function showAlert() {
            alert('Welcome to the CCCU Application Process!');
        }
    </script>
</head>
<body onload="showAlert()">
    <header>
        <h1>CCCU Application Process Guide</h1>
    </header>
    <div class="container">
        <div class="content">
            <h2>Steps to Apply:</h2>
            <ol>
                <li>Research your course options.</li>
                <li>Complete the online application form.</li>
                <li>Prepare your supporting documents.</li>
                <li>Submit your application.</li>
                <li>Await a response from CCCU.</li>
            </ol>
        </div>
    </div>
    <footer>
        <p>&copy; 2026 CCCU. All rights reserved.</p>
    </footer>
</body>
</html>
